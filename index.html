<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beer O'clock Countdown</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f4a100 0%, #ffcc33 50%, #ffdb4d 100%);
    color: #3b2100;
    overflow: hidden;
    position: relative;
  }

  .bubbles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .bubble {
    position: absolute;
    bottom: -50px;
    background: rgba(255, 255, 255, 0.5);
    border-radius: 50%;
    animation: rise linear infinite;
  }

  @keyframes rise {
    0%   { transform: translateY(0) scale(1);   opacity: 0.8; }
    100% { transform: translateY(-110vh) scale(1.4); opacity: 0; }
  }

  .container {
    text-align: center;
    z-index: 1;
    padding: 2rem;
  }

  .beer {
    font-size: 5rem;
    animation: wiggle 2.5s ease-in-out infinite;
    display: inline-block;
    margin-bottom: 0.5rem;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-5deg); }
    50%      { transform: rotate(5deg); }
  }

  h1 {
    font-size: clamp(2.5rem, 8vw, 5.5rem);
    font-weight: 900;
    letter-spacing: -2px;
    margin-bottom: 0.5rem;
    text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.1);
  }

  .subtitle {
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    margin-bottom: 2rem;
    opacity: 0.8;
    font-weight: 600;
  }

  .countdown {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  .unit {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 1.5rem 1.2rem;
    min-width: 110px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
  }

  .number {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .label {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 0.5rem;
    opacity: 0.7;
    font-weight: 700;
  }

  .message {
    font-size: clamp(1rem, 2vw, 1.2rem);
    font-weight: 600;
    opacity: 0.9;
  }

  .cheers {
    display: none;
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: 900;
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.1); }
  }

  .footer {
    position: absolute;
    bottom: 1rem;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.85rem;
    opacity: 0.6;
  }
</style>
</head>
<body>
  <div class="bubbles" id="bubbles"></div>

  <div class="container">
    <div id="active">
      <div class="beer">🍺</div>
      <h1>Beer O'clock</h1>
      <div class="subtitle">Counting down to Friday 4:00 PM CET</div>

      <div class="countdown">
        <div class="unit" id="daysUnit" style="display:none"><div class="number" id="days">00</div><div class="label">Days</div></div>
        <div class="unit"><div class="number" id="hours">00</div><div class="label">Hours</div></div>
        <div class="unit"><div class="number" id="minutes">00</div><div class="label">Minutes</div></div>
        <div class="unit"><div class="number" id="seconds">00</div><div class="label">Seconds</div></div>
      </div>

      <div class="message" id="message">Hang in there — the first sip is on its way 🍻</div>
    </div>

    <div class="cheers" id="cheers">🍻 CHEERS! 🍻<div style="font-size:1.5rem;margin-top:1rem;font-weight:600;">It's Beer O'clock!</div></div>
  </div>

  <div class="footer">Share with the team — cheers! 🍻</div>

<script>
  // Build the 4 PM CET target for TODAY in the user's local time.
  // CET/CEST offset: Europe/Berlin is UTC+1 in winter, UTC+2 in summer.
  // We compute it dynamically so the countdown is correct regardless of where
  // the viewer is located.
  function getCetOffsetMinutes(date) {
    // Use Intl to get the current offset for Europe/Berlin.
    const dtf = new Intl.DateTimeFormat('en-US', {
      timeZone: 'Europe/Berlin',
      timeZoneName: 'shortOffset',
      hour: 'numeric'
    });
    const parts = dtf.formatToParts(date);
    const tzPart = parts.find(p => p.type === 'timeZoneName');
    // tzPart.value like "GMT+2" or "GMT+1"
    const match = tzPart && tzPart.value.match(/GMT([+-])(\d{1,2})(?::(\d{2}))?/);
    if (!match) return 60; // fallback CET
    const sign = match[1] === '-' ? -1 : 1;
    const h = parseInt(match[2], 10);
    const m = match[3] ? parseInt(match[3], 10) : 0;
    return sign * (h * 60 + m);
  }

  // Returns a UTC timestamp for 16:00 Europe/Berlin on the given Berlin Y/M/D.
  function berlinTimestampAt16(y, m, d, refDate) {
    const offsetMin = getCetOffsetMinutes(refDate);
    return Date.UTC(y, m - 1, d, 16, 0, 0) - offsetMin * 60 * 1000;
  }

  // Returns today's Berlin date + weekday (0=Sun..6=Sat) from a JS Date.
  function getBerlinDateParts(date) {
    const dateStr = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'Europe/Berlin',
      year: 'numeric', month: '2-digit', day: '2-digit'
    }).format(date);
    const [y, m, d] = dateStr.split('-').map(Number);
    // Weekday via Intl
    const wdName = new Intl.DateTimeFormat('en-US', {
      timeZone: 'Europe/Berlin', weekday: 'short'
    }).format(date);
    const map = { Sun:0, Mon:1, Tue:2, Wed:3, Thu:4, Fri:5, Sat:6 };
    return { y, m, d, weekday: map[wdName] };
  }

  // Compute countdown state. Returns either:
  //   { state: 'cheers' }  -> Friday between 16:00 and 23:59:59 Berlin
  //   { state: 'counting', target: <UTC ms> }
  function computeState() {
    const now = new Date();
    const { y, m, d, weekday } = getBerlinDateParts(now);
    const todayTarget = berlinTimestampAt16(y, m, d, now);

    // If it's Friday in Berlin...
    if (weekday === 5) {
      // After 4pm Berlin -> celebration until end of Friday
      if (now.getTime() >= todayTarget) {
        return { state: 'cheers' };
      }
      // Before 4pm on Friday -> count down to today 4pm
      return { state: 'counting', target: todayTarget };
    }

    // Not Friday. Count down to the next Friday 4pm Berlin.
    // Days until Friday: weekday 0=Sun..6=Sat; Friday=5
    let daysUntilFriday = (5 - weekday + 7) % 7;
    if (daysUntilFriday === 0) daysUntilFriday = 7; // safety — shouldn't hit
    // Build the Berlin date "daysUntilFriday" from today
    const berlinMidnightUtc = Date.UTC(y, m - 1, d); // not exactly midnight Berlin, but fine for day-math
    const friday = new Date(berlinMidnightUtc + daysUntilFriday * 86400000);
    const fy = friday.getUTCFullYear();
    const fm = friday.getUTCMonth() + 1;
    const fd = friday.getUTCDate();
    return { state: 'counting', target: berlinTimestampAt16(fy, fm, fd, now) };
  }

  let currentState = computeState();

  const daysEl = document.getElementById('days');
  const daysUnitEl = document.getElementById('daysUnit');
  const hoursEl = document.getElementById('hours');
  const minutesEl = document.getElementById('minutes');
  const secondsEl = document.getElementById('seconds');
  const messageEl = document.getElementById('message');
  const activeEl = document.getElementById('active');
  const cheersEl = document.getElementById('cheers');

  const messages = [
    "Hang in there — the first sip is on its way 🍻",
    "Almost there, keep it together 😎",
    "The fridge is ready when you are.",
    "One more email, then we drink.",
    "Work hard now, cheers harder later 🍺",
    "Tick tock… it's nearly time."
  ];

  function pad(n) { return String(n).padStart(2, '0'); }

  function showCheers() {
    activeEl.style.display = 'none';
    cheersEl.style.display = 'block';
    document.title = "🍻 It's Beer O'clock!";
  }

  function showCounting() {
    activeEl.style.display = 'block';
    cheersEl.style.display = 'none';
  }

  function tick() {
    // Re-evaluate state periodically so we transition cleanly:
    //   - into 'cheers' when Friday 4pm hits
    //   - out of 'cheers' when Saturday starts (back to counting)
    currentState = computeState();

    if (currentState.state === 'cheers') {
      showCheers();
      return;
    }

    showCounting();

    const now = Date.now();
    const diff = currentState.target - now;

    if (diff <= 0) {
      // Edge case: just flipped. Recompute next loop.
      showCheers();
      return;
    }

    const totalSeconds = Math.floor(diff / 1000);
    const totalHours = Math.floor(totalSeconds / 3600);
    const days = Math.floor(totalHours / 24);
    const h = totalHours % 24;
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;

    if (days > 0) {
      daysUnitEl.style.display = '';
      daysEl.textContent = pad(days);
    } else {
      daysUnitEl.style.display = 'none';
    }
    hoursEl.textContent = pad(h);
    minutesEl.textContent = pad(m);
    secondsEl.textContent = pad(s);

    document.title = days > 0
      ? `🍺 ${days}d ${pad(h)}:${pad(m)}:${pad(s)} until Beer O'clock`
      : `🍺 ${pad(h)}:${pad(m)}:${pad(s)} until Beer O'clock`;

    // Rotate message every ~10s based on clock
    const msgIdx = Math.floor(totalSeconds / 10) % messages.length;
    messageEl.textContent = messages[msgIdx];
  }

  tick();
  setInterval(tick, 1000);

  // Generate drifting bubbles
  const bubblesContainer = document.getElementById('bubbles');
  for (let i = 0; i < 25; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = Math.random() * 40 + 10;
    b.style.width = size + 'px';
    b.style.height = size + 'px';
    b.style.left = Math.random() * 100 + 'vw';
    b.style.animationDuration = (Math.random() * 8 + 6) + 's';
    b.style.animationDelay = (Math.random() * 8) + 's';
    bubblesContainer.appendChild(b);
  }
</script>
</body>
</html>
